<svg width="680" height="466" viewBox="0 0 680 466" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Serverless data pipeline architecture</title>
<desc>S3 bucket triggers an ingestion Lambda which writes to DynamoDB; a query Lambda reads DynamoDB via an API Gateway endpoint that a user calls.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text { font-family: Arial, sans-serif; }
.th { font-size:14px; font-weight:bold; }
.ts { font-size:12px; }
.arr { stroke:#5F5E5A; stroke-width:1.5; fill:none; }
</style>

<line x1="220" y1="88" x2="278" y2="88" class="arr" marker-end="url(#arrow)"/>
<line x1="370" y1="116" x2="370" y2="168" class="arr" marker-end="url(#arrow)"/>
<line x1="370" y1="226" x2="370" y2="278" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="308" x2="498" y2="308" class="arr" marker-end="url(#arrow)"/>
<line x1="570" y1="336" x2="570" y2="388" class="arr" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="60" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="140" y="82" text-anchor="middle" fill="#04342C">S3 bucket</text>
<text class="ts" x="140" y="100" text-anchor="middle" fill="#085041">Raw file uploads</text>
</g>

<g>
<rect x="280" y="60" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="370" y="82" text-anchor="middle" fill="#26215C">Ingestion lambda</text>
<text class="ts" x="370" y="100" text-anchor="middle" fill="#3C3489">Processes new files</text>
</g>

<g>
<rect x="280" y="170" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="370" y="192" text-anchor="middle" fill="#04342C">DynamoDB</text>
<text class="ts" x="370" y="210" text-anchor="middle" fill="#085041">Stores metadata</text>
</g>

<g>
<rect x="280" y="280" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="370" y="302" text-anchor="middle" fill="#26215C">Query lambda</text>
<text class="ts" x="370" y="320" text-anchor="middle" fill="#3C3489">Reads DynamoDB</text>
</g>

<g>
<rect x="500" y="280" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="570" y="302" text-anchor="middle" fill="#4A1B0C">API gateway</text>
<text class="ts" x="570" y="320" text-anchor="middle" fill="#712B13">HTTP endpoint</text>
</g>

<g>
<rect x="500" y="390" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="570" y="412" text-anchor="middle" fill="#2C2C2A">User</text>
<text class="ts" x="570" y="430" text-anchor="middle" fill="#444441">Requests /files</text>
</g>
</svg>
