AWSTemplateFormatVersion: "2010-09-09"
Description: Serverless Data Ingestion & Query Pipeline

Resources:

  # --- Storage ---
  RawDataBucket:
    Type: AWS::S3::Bucket
    DependsOn: IngestionFunctionPermission
    Properties:
      BucketName: kashvi-pipeline-raw-data
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt IngestionFunction.Arn

  ProcessedFilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ProcessedFilesMetadata
      AttributeDefinitions:
        - AttributeName: file_id
          AttributeType: S
      KeySchema:
        - AttributeName: file_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # --- IAM Roles ---
  IngestionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ingestion-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ingestion-scoped-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::kashvi-pipeline-raw-data/*"
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt ProcessedFilesTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/process-ingested-data:*"

  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: query-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: query-scoped-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:Scan
                Resource: !GetAtt ProcessedFilesTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/query-processed-files:*"

  # --- Lambda Functions ---
  IngestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: process-ingested-data
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt IngestionLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('ProcessedFilesMetadata')

          def lambda_handler(event, context):
              bucket_name = event['Records'][0]['s3']['bucket']['name']
              object_key = event['Records'][0]['s3']['object']['key']

              table.put_item(
                  Item={
                      'file_id': object_key,
                      'bucket': bucket_name,
                      'status': 'processed'
                  }
              )
              print(f"Stored record for: {object_key}")
              return {'statusCode': 200, 'body': json.dumps(f'Processed {object_key}')}

  IngestionFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IngestionFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::kashvi-pipeline-raw-data"

  QueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: query-processed-files
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QueryLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('ProcessedFilesMetadata')

          def lambda_handler(event, context):
              response = table.scan()
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps(response['Items'])
              }

  # --- API Gateway ---
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: files-query-api
      ProtocolType: HTTP

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt QueryFunction.Arn
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /files"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QueryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/files"

Outputs:
  ApiEndpoint:
    Description: Invoke URL for the query endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/files"

